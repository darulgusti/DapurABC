<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crown Basketball Academy - Pendaftaran</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link rel="icon" href="image/basketball (1).png" type="image/png">
</head>
<body>
    <div class="container">
        <header>
            <div class="header-content">
                <h1><i class="fas fa-basketball-ball"></i> Crown Basketball Academy</h1>
                <p>Selamat Datang di Akademi Basket Terbaik!</p>
            </div>
            <button id="loginAdminBtn" class="login-btn" onclick="openLoginModal()">
                <i class="fas fa-lock"></i> Login Admin
            </button>
            <!-- Admin Panel -->
            <div id="adminPanel" class="admin-panel-header" style="display: none;">
                <span id="adminUser" class="admin-user"></span>
                <button class="logout-btn" onclick="handleAdminLogout()">
                    <i class="fas fa-sign-out-alt"></i> Logout
                </button>
            </div>
        </header>

        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('form')">
                <i class="fas fa-edit"></i> Form Pendaftaran
            </button>
            <button id="dataTabBtn" class="tab-btn" onclick="switchTab('data')" style="display: none;">
                <i class="fas fa-list"></i> Data Pendaftar
            </button>
        </div>

        <!-- Tab Form -->
        <div id="form-tab" class="tab-content active">
            <div class="form-container">
                <form id="registrationForm" class="registration-form">
                    <div class="form-group">
                        <label>Nama:</label>
                        <input type="text" id="nama" required>
                    </div>
                    
                    <div class="form-group">
                        <label>Tempat, Tanggal Lahir:</label>
                        <input type="text" id="ttl" placeholder="Contoh: Jakarta, 15 Januari 2010" required>
                    </div>
                    
                    <div class="form-group">
                        <label>Jenis Kelamin:</label>
                        <select id="jenis_kelamin" required>
                            <option value="">Pilih...</option>
                            <option value="Laki-laki">Laki-laki</option>
                            <option value="Perempuan">Perempuan</option>
                        </select>
                    </div>
                    
                    <div class="form-group">
                        <label>Tinggi dan Berat Badan:</label>
                        <input type="text" id="tinggi_berat" placeholder="Contoh: 165 cm, 55 kg" required>
                    </div>
                    
                    <div class="form-group">
                        <label>Nama Sekolah:</label>
                        <input type="text" id="sekolah" required>
                    </div>
                    
                    <div class="form-group">
                        <label>No HP:</label>
                        <input type="tel" id="no_hp" required>
                    </div>
                    
                    <div class="form-group">
                        <label>Alamat Tempat Tinggal:</label>
                        <textarea id="alamat" rows="3" required></textarea>
                    </div>
                    
                    <div class="form-group">
                        <label>Pengalaman Bermain Basket:</label>
                        <div class="radio-group">
                            <label><input type="radio" name="pengalaman" value="Ya" required> Ya (Club: <input type="text" id="club" placeholder="Nama Club">)</label>
                            <label><input type="radio" name="pengalaman" value="Tidak"> Tidak</label>
                        </div>
                    </div>
                    
                    <div class="form-group">
                        <label>Nama Orang Tua/Wali:</label>
                        <input type="text" id="nama_ortu" required>
                    </div>
                    
                    <div class="form-group">
                        <label>Pekerjaan Orang Tua/Wali:</label>
                        <input type="text" id="pekerjaan_ortu" required>
                    </div>
                    
                    <div class="form-group">
                        <label>No HP Orang Tua/Wali:</label>
                        <input type="tel" id="no_hp_ortu" required>
                    </div>
                    
                    <button type="submit" class="submit-btn">
                        <i class="fas fa-paper-plane"></i> Daftarkan
                    </button>
                </form>
            </div>
        </div>

        <!-- Tab Data -->
        <div id="data-tab" class="tab-content">
            <div class="search-container">
                <select id="searchFilter">
                    <option value="nama">Cari Nama</option>
                    <option value="nama_ortu">Cari Nama Ortu</option>
                </select>
                <input type="text" id="searchInput" placeholder="Ketik untuk mencari...">
                <button onclick="clearSearch()"><i class="fas fa-times"></i></button>
            </div>
            
            <div class="stats-box" id="statsBox" style="display:none;">
                <div class="stat-item">
                    <h3 id="totalCount">0</h3>
                    <p>Total Pendaftar</p>
                </div>
            </div>
            
            <div class="data-container">
                <div id="dataTable" class="data-table">
                    <p>Tidak ada data pendaftar. Silakan isi form pendaftaran terlebih dahulu.</p>
                </div>
            </div>
            
            <div class="import-export-buttons" style="display: flex; gap: 10px; margin-top: 20px; flex-wrap: wrap;">
                <button class="export-btn" onclick="exportToExcel()" style="margin-top: 10px;">
                    <i class="fas fa-file-excel"></i> Export ke Excel
                </button>
                <button class="import-btn" onclick="importFromExcel()" style="margin-top: 10px; background: linear-gradient(135deg, #17a2b8, #20c997); color: white; padding: 12px 20px; border: none; border-radius: 8px; cursor: pointer; font-weight: 600; display: flex; align-items: center; gap: 8px;">
                    <i class="fas fa-file-import"></i> Import dari Excel
                </button>
            </div>
        </div>
    </div>

    <!-- Modal Login Admin -->
    <div id="loginModal" class="modal" style="display: none;">
        <div class="modal-content">
            <div class="modal-header">
                <h2><i class="fas fa-lock"></i> Login Admin</h2>
                <button class="close-btn" onclick="closeLoginModal()">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <form id="loginForm" onsubmit="handleAdminLogin(event)" class="login-form">
                <div class="form-group">
                    <label>Username:</label>
                    <input type="text" id="adminUsername" placeholder="Masukkan username" required>
                </div>
                <div class="form-group">
                    <label>Password:</label>
                    <input type="password" id="adminPassword" placeholder="Masukkan password" required>
                </div>
                <div class="login-actions">
                    <button type="submit" class="login-submit">
                        <i class="fas fa-sign-in-alt"></i> Login
                    </button>
                    <button type="button" class="login-cancel" onclick="closeLoginModal()">
                        <i class="fas fa-times"></i> Batal
                    </button>
                </div>
            </form>
            <div id="loginError" class="login-error" style="display: none;"></div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
